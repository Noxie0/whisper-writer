# Configuration options for the Whisper models
model_options:
  common:
    language:
      value: null
      type: str
      description: "Language code for transcription (ISO-639-1 format, e.g. 'en', 'fr', 'de'). Leave blank to auto-detect the spoken language."
    temperature:
      value: 0.0
      type: float
      description: "Controls randomness of the transcription output (0.0 to 1.0). Lower values produce more focused, deterministic results. 0.0 is recommended for most use cases."
    initial_prompt:
      value: null
      type: str
      description: "Text used to prime the transcription model — useful for hinting at technical terms, punctuation style, or preferred formatting. Leave blank for no priming."

  local:
    model:
      value: medium
      type: str
      description: "Whisper model size. Recommended: 'medium' (best balance of speed and accuracy). Use 'large-v3' for maximum accuracy with a GPU. Use 'small' or 'base' for CPU-only setups."
      options:
        - tiny
        - tiny.en
        - base
        - base.en
        - small
        - small.en
        - medium
        - medium.en
        - large-v2
        - large-v3
    device:
      value: auto
      type: str
      description: "Device to run Whisper on. 'auto' detects the best option automatically. 'cuda' forces an NVIDIA GPU. 'cpu' forces CPU — slower but always compatible."
      options:
        - auto
        - cuda
        - cpu
    compute_type:
      value: default
      type: str
      description: "Precision used for inference. 'default' lets the backend decide. 'int8' is fastest and works on CPU and GPU. 'float16' requires a CUDA GPU. 'float32' is slowest but universally compatible."
      options:
        - default
        - float32
        - float16
        - int8
    condition_on_previous_text:
      value: true
      type: bool
      description: "When enabled, uses the previous transcription as context for the next one. Improves consistency across segments but may cause the model to repeat itself occasionally."
    vad_filter:
      value: false
      type: bool
      description: "Filters silence from recordings using Whisper's built-in voice activity detection. Can improve accuracy and speed, but may clip the very beginning or end of speech."
    model_path:
      value: null
      type: str
      description: "Path to a locally saved Whisper model folder. Leave blank to automatically download the selected model to the default cache directory."

# Configuration options for activation and recording
recording_options:
  activation_key:
    value: ctrl+shift+space
    type: str
    description: "Keyboard shortcut to trigger recording. Click the field and press your desired key combination (e.g. 'ctrl+shift+space'). Keys are joined with '+'."
  input_backend:
    value: auto
    type: str
    description: "Backend used to detect the activation key. 'auto' picks the best available option. 'pynput' works on Windows and most systems. 'evdev' is Linux-only. Leave on 'auto' unless you have issues."
    options:
      - auto
      - evdev
      - pynput
  recording_mode:
    value: continuous
    type: str
    description: "How recording is controlled. Continuous: keeps restarting after speech pauses until you press the key again. Voice Activity Detection: stops automatically after a period of silence. Press to Toggle: press key to start, press again to stop. Hold to Record: hold key to record, release to stop and transcribe."
    options:
      - continuous
      - voice_activity_detection
      - press_to_toggle
      - hold_to_record
  sound_device:
    value: null
    type: str
    description: "Microphone to record from. Select 'Default' to use your system default input device, or choose a specific microphone from the list."
  sample_rate:
    value: 16000
    type: int
    description: "Audio recording sample rate in Hz. Whisper is optimized for 16000 Hz — only change this if your microphone does not support it."
  silence_duration:
    value: 900
    type: int
    description: "How long silence must last (in milliseconds) before auto-stopping in Continuous and Voice Activity Detection modes. Lower values stop sooner after you stop talking."
  min_duration:
    value: 100
    type: int
    description: "Minimum recording duration in milliseconds. Recordings shorter than this are silently discarded, preventing accidental triggers from keyboard clicks or brief noises."

# Post-processing options for the transcribed text
post_processing:
  writing_key_press_delay:
    value: 0.005
    type: float
    description: "Delay in seconds between each simulated keystroke when typing out the transcription. Increase if text appears garbled or characters are skipped in fast applications."
  remove_trailing_period:
    value: false
    type: bool
    description: "Removes the period Whisper often appends at the end of transcriptions. Useful when dictating mid-sentence or into fields that handle their own punctuation."
  add_trailing_space:
    value: true
    type: bool
    description: "Adds a space after the transcription so the next word you type starts correctly. Recommended to leave enabled."
  remove_capitalization:
    value: false
    type: bool
    description: "Converts all transcribed text to lowercase, removing the automatic capitalization Whisper applies."
  input_method:
    value: pynput
    type: str
    description: "Method used to type out transcriptions. 'pynput' works on Windows and most systems. 'ydotool' and 'dotool' are Linux alternatives for Wayland sessions."
    options:
      - pynput
      - ydotool
      - dotool

# Miscellaneous settings
misc:
  print_to_terminal:
    value: true
    type: bool
    description: "Prints recording status and transcription results to the terminal or console. Useful for debugging or monitoring activity."
  hide_status_window:
    value: false
    type: bool
    description: "Hides the floating status window that shows recording and transcribing state. The app continues running in the background."
  noise_on_completion:
    value: false
    type: bool
    description: "Plays a short sound when the transcription has finished typing. Useful as audio feedback when you are not watching the screen."
